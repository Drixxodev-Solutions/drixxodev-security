name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Dummy value: Prisma only needs DATABASE_URL to resolve for `validate`/`generate`.
    # No database connection is made — never put a real secret here (CLAUDE.md §7.4).
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # Throwaway fake key — never a real secret (CLAUDE.md §7.4)
          TOKEN_ENCRYPTION_KEY: aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
          # Placeholder Clerk keys — valid format but not real credentials (§7.4).
          # NEXT_PUBLIC_ key is safe to expose; it identifies the Clerk frontend
          # API instance and is not a secret.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_placeholderplaceholderplaceholder
